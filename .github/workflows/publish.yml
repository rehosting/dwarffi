name: Release PyPI

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: "release"
  cancel-in-progress: false

jobs:
  prepare:
    name: Determine Next Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      v-version: ${{ steps.version.outputs.v-version }}
    steps:
      - name: Install dependencies and label git workspace safe
        run: |
          sudo apt-get update
          sudo apt-get -y install git
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # tags/history required

      # IMPORTANT: run version-increment AFTER checkout so .git exists
      - name: Get next version
        uses: reecetech/version-increment@2023.10.1
        id: version
        with:
          use_api: true

  build-binaries:
    name: Build dwarf2json (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            plat_tag: manylinux2014_x86_64
            ext: ""
          - goos: linux
            goarch: arm64
            plat_tag: manylinux2014_aarch64
            ext: ""
          - goos: darwin
            goarch: amd64
            plat_tag: macosx_10_15_x86_64
            ext: ""
          - goos: darwin
            goarch: arm64
            plat_tag: macosx_11_0_arm64
            ext: ""
          - goos: windows
            goarch: amd64
            plat_tag: win_amd64
            ext: ".exe"

    steps:
      # Adjust this repository to point to your fork containing the custom functions modifications
      - name: Checkout dwarf2json
        uses: actions/checkout@v4
        with:
          repository: rehosting/dwarf2json 
          path: dwarf2json
        
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install UPX
        run: sudo apt-get install -y upx

      - name: Build and Compress
        working-directory: dwarf2json
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -trimpath -ldflags="-s -w" -o dwarf2json${{ matrix.ext }} main.go
          
          # UPX does not support modern macOS (Mach-O) binaries. 
          # We only compress Linux and Windows targets.
          if [ "${{ matrix.goos }}" != "darwin" ]; then
            upx --best --lzma dwarf2json${{ matrix.ext }}
          else
            echo "Skipping UPX compression for macOS."
          fi

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.plat_tag }}
          path: dwarf2json/dwarf2json${{ matrix.ext }}

  build-generic:
    name: Build Generic Wheel & SDist
    needs: prepare
    runs-on: ubuntu-latest
    env:
      SETUPTOOLS_SCM_PRETEND_VERSION_FOR_DWARFFI: ${{ needs.prepare.outputs.version }}
      SETUPTOOLS_SCM_PRETEND_VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - name: Checkout dwarffi
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Build Tools
        run: python -m pip install --upgrade pip build

      - name: Ensure empty bin directory
        run: |
          mkdir -p src/dwarffi/bin
          touch src/dwarffi/bin/.keep

      - name: Build SDist and Generic Wheel
        run: python -m build

      - name: Upload Generic Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package-generic
          path: dist/*

  build-platform-wheels:
    name: Build Wheel (${{ matrix.plat_tag }})
    needs: [prepare, build-binaries]
    runs-on: ubuntu-latest
    env:
      SETUPTOOLS_SCM_PRETEND_VERSION_FOR_DWARFFI: ${{ needs.prepare.outputs.version }}
      SETUPTOOLS_SCM_PRETEND_VERSION: ${{ needs.prepare.outputs.version }}
      # Pass the matrix tag directly into our custom hatchling hook!
      DWARFFI_PLATFORM_TAG: ${{ matrix.plat_tag }}
    strategy:
      matrix:
        plat_tag: 
          - manylinux2014_x86_64
          - manylinux2014_aarch64
          - macosx_10_15_x86_64
          - macosx_11_0_arm64
          - win_amd64

    steps:
      - name: Checkout dwarffi
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Build Tools
        run: python -m pip install --upgrade pip build

      - name: Download Target Binary
        uses: actions/download-artifact@v4
        with:
          name: binary-${{ matrix.plat_tag }}
          path: src/dwarffi/bin/

      - name: Build Platform Wheel
        run: python -m build --wheel

      - name: Upload Platform Wheel
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.plat_tag }}
          path: dist/*.whl

  release:
    name: Publish and Release
    needs: [prepare, build-generic, build-platform-wheels]
    runs-on: ubuntu-latest
    steps:
      - name: Gather all packages
        uses: actions/download-artifact@v4
        with:
          pattern: package-*
          path: dist/
          merge-multiple: true

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
          verbose: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.prepare.outputs.v-version }}
          name: Release ${{ needs.prepare.outputs.v-version }}
          generate_release_notes: true
          prerelease: false
          files: |
            dist/*
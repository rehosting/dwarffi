name: Release PyPI

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: "release"
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies and label git workspace safe
        run: |
          sudo apt-get update
          sudo apt-get -y install git
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # tags/history required

      # IMPORTANT: run version-increment AFTER checkout so .git exists
      - name: Get next version
        uses: reecetech/version-increment@2023.10.1
        id: version
        with:
          use_api: true


      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Force package version for build (no commit)
        run: |
          # dist name "dwarffi" -> env suffix "DWARFFI"
          echo "SETUPTOOLS_SCM_PRETEND_VERSION_FOR_DWARFFI=${{ steps.version.outputs.version }}" >> $GITHUB_ENV
          echo "SETUPTOOLS_SCM_PRETEND_VERSION=${{ steps.version.outputs.version }}" >> $GITHUB_ENV

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.version.outputs.v-version }}
          name: Release ${{ steps.version.outputs.v-version }}
          generate_release_notes: true
          prerelease: false
          files: |
            dist/*
name: CI

on:
  pull_request:

jobs:
  lint-test:
    # If release workflow commits with [skip ci], don't rerun CI.
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # Optional: install dwarf2json so integration tests that depend on it can run.
      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
        continue-on-error: true

      - name: Install dwarf2json (optional)
        shell: bash
        run: |
          set -euxo pipefail
          if command -v go >/dev/null 2>&1; then
            go install github.com/volatilityfoundation/dwarf2json@latest
            echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          else
            echo "Go not available; skipping dwarf2json install"
          fi
        continue-on-error: true

      - name: Install (dev)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff
        run: ruff check .

      - name: Pytest
        run: pytest -q